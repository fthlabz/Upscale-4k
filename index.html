<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Factory & NFC Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/easyqrcodejs/dist/easy.qrcode.min.js"></script>
    
    <style>
        :root {
            --bg: #09090b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --accent: #d4af37; /* Gold */
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1c1c1e 0%, #000000 80%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 { margin: 0; font-weight: 800; font-size: 28px; letter-spacing: -1px; }
        p { color: #888; font-size: 14px; margin-top: 5px; margin-bottom: 20px; }

        /* SEKMELER (TABS) */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ORTAK FORMLAR */
        label { font-size: 12px; font-weight: 600; color: #888; display: block; margin-bottom: 8px; text-align: left; margin-top: 15px;}
        select, input[type="range"], input[type="text"], textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

        .file-input-wrapper { margin-top: 10px; text-align: left; }
        .file-input-wrapper input[type="file"] { font-size: 12px; color: #888; }

        /* DROP ZONE (UPSCALER İÇİN) */
        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }
        .drop-zone:hover { border-color: var(--accent); background: rgba(212, 175, 55, 0.05); }
        .drop-zone.dragover { border-color: #fff; background: rgba(255,255,255,0.1); }
        .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.8; }
        #fileInput { display: none; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        /* BUTONLAR */
        .btn-process {
            background: linear-gradient(135deg, #d4af37 0%, #b4932a 100%);
            color: black;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-process:active { transform: scale(0.98); }
        .btn-process:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .btn-nfc {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2);
            color: white;
            margin-top: 15px;
        }

        /* POP-UP (MODAL) EKRANI */
        .modal {
            display: none; 
            position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            max-width: 90%;
        }
        .close-btn {
            position: absolute; top: 10px; right: 15px;
            color: #888; font-size: 24px; font-weight: bold; cursor: pointer;
        }
        .close-btn:hover { color: #fff; }
        #qrCodeContainer { background: white; padding: 15px; border-radius: 10px; display: inline-block; }

        #status { margin-top: 15px; font-size: 13px; font-weight: 600; color: var(--accent); display: none; }
        canvas { display: none; } 
    </style>
</head>
<body>

<div class="container">
    <h1>Dijital İstasyon</h1>
    <p>Görsel Upscale, QR Oluşturucu ve NFC Aracı</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('upscale')">🖼️ Upscaler</button>
        <button class="tab-btn" onclick="switchTab('qr')">📲 QR & NFC</button>
    </div>

    <div id="upscaleTab">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon">🖼️</div>
            <div id="dropText">Resmi Buraya Sürükle veya Seç</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="controls">
            <div>
                <label>HEDEF ÇÖZÜNÜRLÜK</label>
                <select id="resolution">
                    <option value="2048">2K (2048px)</option>
                    <option value="3072">3K (3072px)</option>
                    <option value="4096" selected>4K (4096px)</option>
                </select>
            </div>
            <div>
                <label>KESKİNLİK</label>
                <input type="range" id="sharpness" min="0" max="100" value="60">
            </div>
        </div>

        <button class="btn-process" id="processBtn" onclick="islemBaslat()" disabled>GÖRSEL SEÇİLMEDİ</button>
        <div id="status">İşleniyor... Lütfen bekleyin.</div>
    </div>

    <div id="qrTab" style="display: none;">
        <label>VERİ TİPİ SEÇİN (NFC Tools Mantığı)</label>
        <select id="qrType" onchange="updatePlaceholder()">
            <option value="link">🌐 Web Sitesi (Link)</option>
            <option value="text">📝 Not / Serbest Metin</option>
            <option value="whatsapp">💬 WhatsApp Mesaj Bağlantısı</option>
            <option value="phone">📞 Telefon Numarası</option>
        </select>

        <label id="inputLabel">İÇERİK</label>
        <textarea id="qrInput" rows="3" placeholder="https://ornek.com adresini girin..."></textarea>

        <div class="file-input-wrapper">
            <label>QR ORTASINA LOGO EKLE (İsteğe Bağlı)</label>
            <input type="file" id="qrLogo" accept="image/png, image/jpeg, image/svg+xml">
        </div>

        <button class="btn-process" onclick="generatePopupQR()">📲 QR OLUŞTUR & GÖSTER</button>
        <button class="btn-process btn-nfc" onclick="writeToNFC()">📡 NFC ETİKETİNE YAZ</button>
    </div>
</div>

<div id="qrModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 style="margin-top:0; font-size:18px;">Oluşturulan QR Kod</h2>
        <div id="qrCodeContainer"></div>
        <p style="font-size: 12px; color: #888; margin-top:15px;">Kodu taratmak için kameranızı kullanın.</p>
    </div>
</div>

<script>
    // --- SEKME (TAB) YÖNETİMİ ---
    function switchTab(tabName) {
        document.getElementById('upscaleTab').style.display = tabName === 'upscale' ? 'block' : 'none';
        document.getElementById('qrTab').style.display = tabName === 'qr' ? 'block' : 'none';
        
        const btns = document.querySelectorAll('.tab-btn');
        btns[0].classList.toggle('active', tabName === 'upscale');
        btns[1].classList.toggle('active', tabName === 'qr');
    }

    // --- BÖLÜM 1: QR VE NFC İŞLEMLERİ ---
    
    // Veri tipine göre input placeholderını güncelle
    function updatePlaceholder() {
        const type = document.getElementById('qrType').value;
        const input = document.getElementById('qrInput');
        if (type === 'link') input.placeholder = "https://ornek.com adresini girin...";
        if (type === 'text') input.placeholder = "NFC veya QR içine gizlenecek notunuzu yazın...";
        if (type === 'whatsapp') input.placeholder = "Örn: 905551234567 (Başında + olmadan)";
        if (type === 'phone') input.placeholder = "Örn: 05551234567 veya +90555...";
    }

    // İşlenecek final metni/linki oluştur
    function getFinalPayload() {
        const type = document.getElementById('qrType').value;
        const val = document.getElementById('qrInput').value.trim();
        if(!val) return null;

        if (type === 'whatsapp') return `https://wa.me/${val.replace(/[^0-9]/g, '')}`;
        if (type === 'phone') return `tel:${val.replace(/[^0-9+]/g, '')}`;
        return val; // link veya text
    }

    // QR Kod Oluştur ve Pop-up Aç
    function generatePopupQR() {
        const payload = getFinalPayload();
        if (!payload) { alert("Lütfen içerik alanını doldurun!"); return; }

        const container = document.getElementById('qrCodeContainer');
        container.innerHTML = ""; // Eski QR'ı temizle
        
        const logoFile = document.getElementById('qrLogo').files[0];
        
        // EasyQRCodeJS Konfigürasyonu
        const options = {
            text: payload,
            width: 250,
            height: 250,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H, // Logo ekleneceği için hata toleransı Yüksek (H) olmalı
            dotScale: 1 // Nokta yoğunluğu
        };

        // Eğer logo seçilmişse konfigürasyona ekle
        if (logoFile) {
            const logoUrl = URL.createObjectURL(logoFile);
            options.logo = logoUrl;
            options.logoWidth = 60;
            options.logoHeight = 60;
            options.logoBackgroundTransparent = true;
        }

        // QR'ı container içine bas
        new QRCode(container, options);

        // Pop-up'ı göster
        document.getElementById('qrModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('qrModal').style.display = 'none';
    }

    // Modal dışına tıklanınca kapatma
    window.onclick = function(event) {
        const modal = document.getElementById('qrModal');
        if (event.target == modal) { modal.style.display = "none"; }
    }

    // Gerçek Web NFC API ile Etikete Yazma İşlemi
    async function writeToNFC() {
        const payload = getFinalPayload();
        if (!payload) { alert("Lütfen yazdırılacak veriyi girin!"); return; }

        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                alert("Lütfen telefonunuzun arkasını bir NFC etiketine yaklaştırın...");
                await ndef.write(payload);
                alert("Başarılı! Veri NFC etiketine yazıldı.");
            } catch (error) {
                alert("NFC Yazma Hatası: " + error + "\nNot: Tarayıcınız desteklemiyor veya NFC kapalı olabilir.");
            }
        } else {
            alert("Web NFC API desteklenmiyor! Bu özellik yalnızca Android'deki Chrome tarayıcılarında çalışır.");
        }
    }

    // --- BÖLÜM 2: UPSCALER İŞLEMLERİ (ORİJİNAL KODLAR) ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusText = document.getElementById('status');
    const dropText = document.getElementById('dropText');
    let selectedFile = null;

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        dosyaYakala(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => dosyaYakala(e.target.files[0]));

    function dosyaYakala(file) {
        if (!file || !file.type.startsWith('image/')) return;
        selectedFile = file;
        dropText.innerText = `Seçildi: ${file.name}`;
        processBtn.innerText = "KAYDET VE İNDİR (HD)";
        processBtn.disabled = false;
        processBtn.style.background = "linear-gradient(135deg, #d4af37 0%, #b4932a 100%)";
        processBtn.style.color = "black";
    }

    function islemBaslat() {
        if (!selectedFile) return;
        statusText.style.display = "block";
        processBtn.disabled = true;
        processBtn.innerText = "İŞLENİYOR... (Ağır İşlem)";

        setTimeout(() => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() { upscaleImage(img); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(selectedFile);
        }, 100);
    }

    function upscaleImage(img) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const targetSize = parseInt(document.getElementById('resolution').value);
        let width = img.width;
        let height = img.height;
        
        if (width > height) { height = Math.round(height * (targetSize / width)); width = targetSize; } 
        else { width = Math.round(width * (targetSize / height)); height = targetSize; }

        canvas.width = width; canvas.height = height;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, width, height);

        const sharpness = parseInt(document.getElementById('sharpness').value) / 100;
        if (sharpness > 0) { applySharpening(ctx, width, height, sharpness); }

        const outputName = "HD_" + selectedFile.name.split('.')[0] + ".jpg";
        canvas.toBlob((blob) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = outputName;
            link.click();
            statusText.style.display = "none";
            processBtn.disabled = false;
            processBtn.innerText = "TEKRAR İŞLE";
        }, 'image/jpeg', 0.95);
    }

    function applySharpening(ctx, w, h, mix) {
        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        const buff = new Uint8ClampedArray(data);

        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                const off = (y * w + x) * 4;
                const offUp = ((y - 1) * w + x) * 4;
                const offDown = ((y + 1) * w + x) * 4;
                const offLeft = (y * w + (x - 1)) * 4;
                const offRight = (y * w + (x + 1)) * 4;

                const r = buff[off] * 5 - buff[offUp] - buff[offDown] - buff[offLeft] - buff[offRight];
                const g = buff[off + 1] * 5 - buff[offUp + 1] - buff[offDown + 1] - buff[offLeft + 1] - buff[offRight + 1];
                const b = buff[off + 2] * 5 - buff[offUp + 2] - buff[offDown + 2] - buff[offLeft + 2] - buff[offRight + 2];

                data[off] = data[off] * (1 - mix) + r * mix;
                data[off + 1] = data[off + 1] * (1 - mix) + g * mix;
                data[off + 2] = data[off + 2] * (1 - mix) + b * mix;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }
</script>

</body>
</html>
